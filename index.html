<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#000; position:fixed; top:0; left:0; }
        #unity-container { width:100vw; height:100vh; background:#000; display:flex; justify-content:center; align-items:center; position:fixed; top:0; left:0; }
        #unity-canvas { background:#000; display:block; /* 居中由父级 flex 负责 */ }
        #loading-area { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); color:#fff; font-family:Arial,sans-serif; z-index:20; text-align:center; width:80%; max-width:400px; }
        #progress-bg { width:100%; height:6px; background:#333; border-radius:3px; margin:12px 0 0; }
        #progress-fill { width:0%; height:100%; background:#00ccff; border-radius:3px; }
        #error-msg { color:#ff5555; font-size:14px; margin-top:20px; word-break:break-all; display:none; }
        #rotate-tip { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#fff; font-size:24px; display:none; justify-content:center; align-items:center; z-index:9999; flex-direction:column; text-align:center; font-family:Arial,sans-serif; }
        #rotate-tip span { font-size:16px; color:#aaa; margin-top:10px; }
        @media (orientation: portrait) { #rotate-tip { display:flex !important; } }
        @media (orientation: landscape) { #rotate-tip { display:none !important; } }
    </style>
</head>
<body>

    <div id="rotate-tip">📱⤵️Please rotate your phone<span>(Automatically enter after rotating)</span></div>
    <div id="loading-area"><div id="loading-status">加载中...</div><div id="progress-bg"><div id="progress-fill"></div></div><div id="error-msg"></div></div>
    <div id="unity-container"><canvas id="unity-canvas"></canvas></div>

    <script>
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        var canvas = document.getElementById("unity-canvas");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;
        var dpr = window.devicePixelRatio || 1;
        var unityInstance = null;
        var rafId = null;           // requestAnimationFrame ID
        var fixUntil = 0;           // 持续修复的截止时间戳

        // =========================================================
        // 核心适配（仅当尺寸异常时才修正，避免闪烁）
        // =========================================================
        function fitCanvas(force) {
            if (!canvas) return;
            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            if (screenW === 0 || screenH === 0) return;

            var screenRatio = screenW / screenH;
            var displayW, displayH;
            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }
            displayW = Math.round(displayW);
            displayH = Math.round(displayH);

            // CSS 尺寸（仅变更时设置）
            var styleW = displayW + 'px';
            var styleH = displayH + 'px';
            if (canvas.style.width !== styleW || canvas.style.height !== styleH) {
                canvas.style.width = styleW;
                canvas.style.height = styleH;
            }

            // 物理像素尺寸（期望值）
            var realW = displayW * dpr;
            var realH = displayH * dpr;

            // 当 Canvas 属性与期望不符，或强制刷新时，覆盖并同步 Unity
            if (force || canvas.width !== realW || canvas.height !== realH) {
                canvas.width = realW;
                canvas.height = realH;
                if (unityInstance && typeof unityInstance.SetResolution === 'function') {
                    unityInstance.SetResolution(realW, realH);
                }
                console.log('🛠️ Canvas 分辨率修正为 ' + realW + 'x' + realH);
            }
        }

        // 外部可调用刷新
        window.refreshGameCanvas = function() {
            dpr = window.devicePixelRatio || 1;
            fitCanvas(true);
            // 不再额外派发 resize，避免干扰
        };

        // =========================================================
        // 逐帧监控（游戏启动后持续 6 秒，彻底压制闪烁）
        // =========================================================
        function startFrameMonitor(durationMs) {
            fixUntil = Date.now() + durationMs;
            if (rafId) cancelAnimationFrame(rafId);

            function loop() {
                if (Date.now() < fixUntil) {
                    fitCanvas(false);          // 仅异常时修正
                    rafId = requestAnimationFrame(loop);
                } else {
                    rafId = null;
                    console.log('✅ 逐帧监控结束');
                }
            }
            rafId = requestAnimationFrame(loop);
        }

        // 常规事件
        window.addEventListener('resize', function() {
            clearTimeout(this._resizeTimer);
            this._resizeTimer = setTimeout(window.refreshGameCanvas, 200);
        });
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                window.refreshGameCanvas();
                setTimeout(window.refreshGameCanvas, 600);
            }, 600);
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) setTimeout(window.refreshGameCanvas, 300);
        });

        // 加载状态
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');
        if (!window.WebGLRenderingContext) { statusEl.innerHTML = '浏览器不支持 WebGL'; throw new Error('No WebGL'); }

        // 手动加载 framework & loader
        var frameworkLoaded = false, loaderLoaded = false;
        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded && typeof unityFramework !== 'undefined' && typeof createUnityInstance !== 'undefined') {
                startUnity();
            }
        }
        var fs = document.createElement('script'); fs.src = buildFiles.frameworkUrl;
        fs.onload = function(){ frameworkLoaded = true; checkAndStart(); };
        fs.onerror = function(){ statusEl.innerHTML = '❌ framework.js 加载失败'; };
        document.head.appendChild(fs);
        var ls = document.createElement('script'); ls.src = buildFiles.loaderUrl;
        ls.onload = function(){ loaderLoaded = true; checkAndStart(); };
        ls.onerror = function(){ statusEl.innerHTML = '❌ loader.js 加载失败'; };
        document.head.appendChild(ls);

        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };
            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) document.getElementById('loading-area').style.display = 'none';
            }
            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                unityInstance = instance;
                // 首次完整适配
                window.refreshGameCanvas();
                // 启动逐帧监控，持续 6 秒（彻底覆盖倒计时及场景切换）
                startFrameMonitor(6000);
            }
            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
            }
            setTimeout(window.refreshGameCanvas, 50);
            createUnityInstance(canvas, config, onProgress).then(onSuccess).catch(onError);
        }

        // 初始适配
        setTimeout(window.refreshGameCanvas, 50);
    </script>
</body>
</html>
