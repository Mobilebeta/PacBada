<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PacBada Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        #unity-canvas {
            background: #000;
            display: block;
        }
        #loading-area {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            z-index: 20;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        #progress-bg {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 12px 0 0;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #00ccff;
            border-radius: 3px;
        }
        #error-msg {
            color: #ff5555;
            font-size: 14px;
            margin-top: 20px;
            word-break: break-all;
            display: none;
        }
        #rotate-tip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            font-size: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #rotate-tip span {
            font-size: 16px;
            color: #aaa;
            margin-top: 10px;
        }
        @media (orientation: portrait) {
            #rotate-tip { display: flex !important; }
        }
        @media (orientation: landscape) {
            #rotate-tip { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="rotate-tip">
        📱⤵️Please rotate your phone
        <span>（Automatically enter after rotating the phone）</span>
    </div>

    <div id="loading-area">
        <div id="loading-status">加载中...</div>
        <div id="progress-bg"><div id="progress-fill"></div></div>
        <div id="error-msg"></div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        // =========================================================
        // 文件路径配置（请与 Build 文件夹内文件名完全一致）
        // =========================================================
        var buildFiles = {
            loaderUrl: "Build/PacbadaWebMobileFinal.loader.js",
            frameworkUrl: "Build/PacbadaWebMobileFinal.framework.js",
            dataUrl: "Build/PacbadaWebMobileFinal.data",
            wasmUrl: "Build/PacbadaWebMobileFinal.wasm",
        };

        var canvas = document.getElementById("unity-canvas");
        var GAME_W = 1280;
        var GAME_H = 720;
        var GAME_RATIO = GAME_W / GAME_H;
        var dpr = window.devicePixelRatio || 1;
        var unityInstance = null;

        // =========================================================
        // ★ 核心适配函数（强制覆盖版 —— 专治画面放大）
        // =========================================================
        function fitCanvas() {
            if (!canvas) return;
            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            if (screenW === 0 || screenH === 0) return;

            var screenRatio = screenW / screenH;
            var displayW, displayH;

            if (screenRatio > GAME_RATIO) {
                displayH = screenH;
                displayW = screenH * GAME_RATIO;
            } else {
                displayW = screenW;
                displayH = screenW / GAME_RATIO;
            }

            displayW = Math.round(displayW);
            displayH = Math.round(displayH);

            // CSS 显示尺寸
            canvas.style.width = displayW + 'px';
            canvas.style.height = displayH + 'px';
            canvas.style.position = 'absolute';
            canvas.style.left = '50%';
            canvas.style.top = '50%';
            canvas.style.transform = 'translate(-50%, -50%)';
            canvas.style.background = '#000';

            // ★★★★★ 关键修正：无论当前值如何，强制覆盖物理像素（去掉 if 判断）★★★★★
            var realW = displayW * dpr;
            var realH = displayH * dpr;
            canvas.width = realW;
            canvas.height = realH;
            console.log('🔥 强制覆盖 Canvas 分辨率: ' + realW + 'x' + realH);

            // 同步 Unity 引擎内部渲染分辨率
            if (unityInstance && typeof unityInstance.SetResolution === 'function') {
                unityInstance.SetResolution(canvas.width, canvas.height);
                console.log('✅ 同步 Unity 分辨率: ' + canvas.width + 'x' + canvas.height);
            }
        }

        // ★ 全局刷新函数（供 Unity 或外部调用）
        window.refreshGameCanvas = function() {
            console.log('🔄 收到刷新请求');
            dpr = window.devicePixelRatio || 1;
            fitCanvas();
            // 额外触发 resize 事件，以防 Unity 内部监听
            window.dispatchEvent(new Event('resize'));
        };

        // =========================================================
        // 监听事件（增强版）
        // =========================================================
        window.addEventListener('resize', function() {
            console.log('📐 resize 事件触发');
            setTimeout(window.refreshGameCanvas, 200);
        });

        window.addEventListener('orientationchange', function() {
            console.log('🔄 orientationchange 事件触发');
            // 首次延迟 600ms，再二次延迟 1200ms 双重保险
            setTimeout(function() {
                window.refreshGameCanvas();
                setTimeout(window.refreshGameCanvas, 600);
            }, 600);
        });

        // 监听页面可见性变化（切回前台时重新适配）
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👀 页面可见性变化（回到前台）');
                setTimeout(window.refreshGameCanvas, 300);
            }
        });

        // =========================================================
        // 加载状态元素
        // =========================================================
        var statusEl = document.getElementById('loading-status');
        var fillEl = document.getElementById('progress-fill');
        var errorEl = document.getElementById('error-msg');

        if (!window.WebGLRenderingContext) {
            statusEl.innerHTML = '浏览器不支持 WebGL';
            throw new Error('No WebGL');
        }

        // =========================================================
        // 手动加载 framework.js 与 loader.js
        // =========================================================
        var frameworkLoaded = false;
        var loaderLoaded = false;

        function checkAndStart() {
            if (frameworkLoaded && loaderLoaded) {
                if (typeof unityFramework !== 'undefined' && typeof createUnityInstance !== 'undefined') {
                    console.log('✅ 依赖就绪，启动 Unity');
                    startUnity();
                } else {
                    statusEl.innerHTML = '❌ 缺少核心函数';
                }
            }
        }

        var frameworkScript = document.createElement('script');
        frameworkScript.src = buildFiles.frameworkUrl;
        frameworkScript.onload = function() { frameworkLoaded = true; checkAndStart(); };
        frameworkScript.onerror = function() { statusEl.innerHTML = '❌ framework.js 加载失败'; };
        document.head.appendChild(frameworkScript);

        var loaderScript = document.createElement('script');
        loaderScript.src = buildFiles.loaderUrl;
        loaderScript.onload = function() { loaderLoaded = true; checkAndStart(); };
        loaderScript.onerror = function() { statusEl.innerHTML = '❌ loader.js 加载失败'; };
        document.head.appendChild(loaderScript);

        // =========================================================
        // 启动 Unity
        // =========================================================
        function startUnity() {
            var config = {
                dataUrl: buildFiles.dataUrl,
                frameworkUrl: buildFiles.frameworkUrl,
                codeUrl: buildFiles.wasmUrl,
                streamingAssetsUrl: 'StreamingAssets',
                companyName: 'DefaultCompany',
                productName: 'PacBada',
                productVersion: '1.0',
                showBanner: false,
            };

            function onProgress(progress) {
                var pct = Math.min(100, Math.round(progress * 100));
                fillEl.style.width = pct + '%';
                statusEl.innerHTML = '加载中 ' + pct + '%';
                if (pct >= 100) {
                    document.getElementById('loading-area').style.display = 'none';
                }
            }

            function onSuccess(instance) {
                document.getElementById('loading-area').style.display = 'none';
                console.log('🎮 游戏启动成功');
                unityInstance = instance;

                // 立即适配一次
                window.refreshGameCanvas();

                // ★ 关键修补：在 3-2-1 倒计时期间（0.5s ~ 5s）每 300ms 暴力刷新一次
                // 彻底压住 Unity 内部可能错误修改 Canvas 物理像素的行为
                for (var i = 0; i < 16; i++) {
                    (function(index) {
                        var delay = 500 + index * 300; // 500ms, 800ms, 1100ms ... 5000ms
                        setTimeout(function() {
                            console.log('⏰ 倒计时防放大刷新 #' + (index + 1));
                            window.refreshGameCanvas();
                        }, delay);
                    })(i);
                }

                // 额外保险：6.5 秒再补一次
                setTimeout(window.refreshGameCanvas, 6500);
            }

            function onError(err) {
                statusEl.innerHTML = '❌ 加载失败';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '错误详情：<br>' + (err.message || err);
                console.error('Unity 加载错误:', err);
            }

            // 启动前先做一次适配
            setTimeout(window.refreshGameCanvas, 50);

            createUnityInstance(canvas, config, onProgress).then(onSuccess).catch(onError);
        }

        // 初始适配
        setTimeout(window.refreshGameCanvas, 50);
    </script>
</body>
</html>
